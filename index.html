<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>DevCircuit Blog</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

<header>
  <h1>DevCircuit</h1>
  <p>Tech experiments, electronics, and real-world projects.</p>
  <nav>
    <a href="https://thetechguy-kt.github.io">Root Home</a>
    <a href="index.html">Home</a>
    <a href="about.html">About</a>
  </nav>
</header>

<main>
  <section class="posts" id="posts-container">
    <!-- Posts will load here automatically -->
  </section>
</main>

<footer>
  <p>© 2026 DevCircuit. All rights reserved.</p>
</footer>

<script>
  const posts = [
    {
      folder: "post1",
      title: "Arduino Basics: What You Need to Know",
      date: "March 1, 2026",
      description: "A complete beginner guide to understanding Arduino boards, essential components, and your first working program."
    },
    {
      folder: "post2",
      title: "Ultrasonic Sensor with Arduino",
      date: "March 3, 2026",
      description: "Learn how the HC-SR04 ultrasonic sensor works, wiring, and measuring distance using Arduino."
    }
  ];

  const container = document.getElementById("posts-container");

  posts.reverse().forEach(post => {
    const article = document.createElement("article");
    article.className = "card";

    article.innerHTML = `
      <h2>
        <a href="posts/${post.folder}/">${post.title}</a>
      </h2>
      <p class="date">${post.date}</p>
      <p>${post.description}</p>
    `;

    container.appendChild(article);
  });
</script>

</body>
</html>
